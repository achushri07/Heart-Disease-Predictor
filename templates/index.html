<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🫀 Heart Disease Risk Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>🫀 Heart Disease Risk Predictor</h1>
        <form action="/predict" method="post">

            <label>Age:</label>
            <input type="number" name="Age" min="25" max="85" required><br>

            <label>Sex:</label>
            <select name="Sex">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select><br>

            <label>RestingBP:</label>
            <input type="number" name="RestingBP" min="80" max="200" required><br>

            <label>Cholesterol:</label>
            <input type="number" name="Cholesterol" min="100" max="400" required><br>

            <label>FastingBS:</label>
            <select name="FastingBS">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select><br>

            <label>MaxHR:</label>
            <input type="number" name="MaxHR" min="60" max="220" required><br>

            <label>ExerciseAngina:</label>
            <select name="ExerciseAngina">
                <option value="No">No</option>
                <option value="Yes">Yes</option>
            </select><br>

            <label>Oldpeak:</label>
            <input type="number" step="0.1" name="Oldpeak" min="0" max="7" required><br>

            <label>Slope:</label>
            <select name="Slope">
                <option value="Upsloping">Upsloping</option>
                <option value="Flat">Flat</option>
                <option value="Downsloping">Downsloping</option>
            </select>

            <label>CA:</label>
            <input type="number" name="CA" min="0" max="3" required><br>

            <button type="submit">Predict Condition</button>
        </form>

        {% if prediction_text %}
        <div id="resultModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal()">&times;</span>
                <h2>🫀 Predicted Condition</h2>
                <p>{{ prediction_text }}</p>
                <button class="modal-button" onclick="closeModal()">Close</button>
            </div>
        </div>

        <script>
            // Show modal after prediction
            document.getElementById("resultModal").style.display = "block";
            function closeModal() {
                document.getElementById("resultModal").style.display = "none";
            }
        </script>
        {% endif %}

    </div>
</body>

</html>
